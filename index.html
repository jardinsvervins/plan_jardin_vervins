<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Planificateur Mobile Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:#222;
color:white;
}

/* toolbar mobile */

#toolbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:#333;
display:flex;
justify-content:space-around;
padding:10px;
z-index:10;
}

button{
padding:10px;
font-size:16px;
}

/* palette */

#palette{
position:fixed;
top:0;
left:0;
right:0;
display:flex;
justify-content:center;
background:#444;
padding:10px;
z-index:10;
}

.palette-item{
width:50px;
height:50px;
margin:5px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#d2a679,#c18a5c);
border:2px solid #6b3e1f;
font-size:26px;
}

/* plan */

#plan{
position:absolute;
top:60px;
bottom:60px;
left:0;
right:0;
overflow:hidden;
touch-action:none;
background:
linear-gradient(#444 1px, transparent 1px),
linear-gradient(90deg,#444 1px, transparent 1px);
background-size:40px 40px;
}

/* formes */

.forme{
position:absolute;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,#d2a679,#c18a5c);
border:2px solid #6b3e1f;
font-size:26px;
transform-origin:center;
}

.rond{border-radius:50%;}
.rectangle{width:90px;height:50px;}
.triangle{
width:0;height:0;
border-left:30px solid transparent;
border-right:30px solid transparent;
border-bottom:60px solid #c18a5c;
background:none;border:none;
}
.tournesol{background:none;border:none;font-size:40px;}

</style>
</head>

<body>

<div id="palette">
<div class="palette-item" onclick="add('rond')"></div>
<div class="palette-item" onclick="add('rectangle')"></div>
<div class="palette-item" onclick="add('triangle')"></div>
<div class="palette-item" onclick="add('croix')">✚</div>
<div class="palette-item" onclick="add('tournesol')">🌻</div>
</div>

<div id="plan"></div>

<div id="toolbar">
<button onclick="rotate()">🔄</button>
<button onclick="scaleUp()">➕</button>
<button onclick="scaleDown()">➖</button>
<button onclick="save()">💾</button>
<button onclick="load()">📂</button>
<button onclick="exportImg()">📸</button>
</div>

<script>

const plan=document.getElementById("plan")

let selected=null

/* ajouter */

function add(type){

let el=document.createElement("div")
el.classList.add("forme",type)

if(type=="croix") el.innerHTML="✚"
if(type=="tournesol") el.innerHTML="🌻"

el.style.transform="translate(100px,100px)"

enableTouch(el)

plan.appendChild(el)

}

/* interaction tactile */

function enableTouch(el){

let startX,startY
let posX=100,posY=100
let scale=1
let rotation=0

el.addEventListener("touchstart",e=>{

selected=el

if(e.touches.length==1){

startX=e.touches[0].clientX
startY=e.touches[0].clientY

}

if(e.touches.length==2){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

el.startDist=Math.hypot(dx,dy)
el.startAngle=Math.atan2(dy,dx)

}

})

el.addEventListener("touchmove",e=>{

e.preventDefault()

if(e.touches.length==1){

let dx=e.touches[0].clientX-startX
let dy=e.touches[0].clientY-startY

posX+=dx
posY+=dy

startX=e.touches[0].clientX
startY=e.touches[0].clientY

}

if(e.touches.length==2){

let dx=e.touches[0].clientX-e.touches[1].clientX
let dy=e.touches[0].clientY-e.touches[1].clientY

let dist=Math.hypot(dx,dy)
let angle=Math.atan2(dy,dx)

scale*=dist/el.startDist
rotation+= (angle-el.startAngle)*180/Math.PI

el.startDist=dist
el.startAngle=angle

}

el.style.transform=
`translate(${posX}px,${posY}px) scale(${scale}) rotate(${rotation}deg)`

})

el.addEventListener("dblclick",()=>el.remove())

}

/* boutons */

function rotate(){
if(!selected)return
selected.style.transform+=" rotate(45deg)"
}

function scaleUp(){
if(!selected)return
selected.style.transform+=" scale(1.1)"
}

function scaleDown(){
if(!selected)return
selected.style.transform+=" scale(0.9)"
}

/* sauvegarde */

function save(){

let data=[]

document.querySelectorAll(".forme").forEach(el=>{
data.push({
html:el.outerHTML
})
})

localStorage.setItem("planProMobile",JSON.stringify(data))
alert("Sauvegardé")

}

function load(){

plan.innerHTML=""

let data=JSON.parse(localStorage.getItem("planProMobile")||"[]")

data.forEach(d=>{
let div=document.createElement("div")
div.innerHTML=d.html
let el=div.firstChild
enableTouch(el)
plan.appendChild(el)
})

}

/* export */

function exportImg(){

html2canvas(plan).then(canvas=>{
let link=document.createElement("a")
link.download="plan.png"
link.href=canvas.toDataURL()
link.click()
})

}

</script>

</body>
</html>
